<!DOCTYPE html>
<html>
<head>
  <title>Food Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
  <h2>🍔 FoodApp</h2>
  <div class="cart">Cart: <span id="cart-count">0</span></div>
</div>

<!-- ✅ FILTERS -->
<div class="filters">
  <button onclick="loadProducts()">All</button>
  <button onclick="filterCategory('veg')">Veg</button>
  <button onclick="filterCategory('non-veg')">Non-Veg</button>
</div>

<!-- ✅ PRODUCT GRID -->
<div id="products" class="grid"></div>

<script src="app.js"></script>

</body>
</html>
